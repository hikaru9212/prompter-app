// ─── Claude API 呼び出し ─────────────────────────────────────────
async function generateScript(apiKey, topic, hookPattern = 'random', scene = 'none', frameworkKey = 'default', boostKey = 'none') {
  const sceneObj = SCENES.find(s => s.key === scene);
  const sceneInst = sceneObj?.instruction || '';
  const baseHookInst = HOOK_INSTRUCTIONS[hookPattern] || HOOK_INSTRUCTIONS.random;
  const hookInst = scene !== 'none' && sceneObj
    ? baseHookInst + ` フックも「${sceneObj.label}」シーンに合った具体的な場面・体験から始めること。`
    : baseHookInst;
  const fw = FRAMEWORKS.find(f => f.key === frameworkKey) || FRAMEWORKS[0];
  const boost = PROMPT_BOOSTS.find(b => b.key === boostKey);
  let basePrompt = fw.prompt(topic, hookInst, sceneInst);

  // シーンが指定されている場合、hookフィールドにシーン指示を直接埋め込む
  if (scene !== 'none' && sceneObj) {
    basePrompt = basePrompt.replace(
      /"hook":\s*"([\s\S]*?)"/,
      (_, inner) => `"hook": "${inner} ★必ず${sceneObj.label}のシーンに合った具体的な場面・体験からフックを書くこと（例：育児なら子どもや育児の場面、ビジネスなら職場・商談の場面から始める）★"`
    );
  }

  const prompt = boost?.inject ? boost.inject(basePrompt) : basePrompt;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1200,
      ...(scene !== 'none' && sceneObj ? {
        system: `あなたは今「${sceneObj.label}」シーン専用の台本を作ります。hookフィールドは必ず${sceneObj.label}に関連した具体的な場面・体験から始めること。他のすべてのフィールドも${sceneObj.label}のシーンに合わせること。`,
      } : {}),
      messages: [{ role: 'user', content: prompt }],
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `APIエラー (${res.status})`);
  }

  const data = await res.json();
  const text = data.content?.[0]?.text || '';
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('レスポンスのパースに失敗しました: ' + text.slice(0, 100));
  return { ...postProcess(JSON.parse(match[0])), frameworkKey };
}

function postProcess(parsed) {
  // 「これ行動経済学で解説できます！」を必ずsummaryに含める
  if (parsed.summary && !parsed.summary.includes('行動経済学')) {
    parsed.summary = 'これ行動経済学で解説できます！ ' + parsed.summary;
  }
  // トピック自体がリストにある場合は効果名をトピックに強制一致
  const themeClean = (parsed.theme || '').trim();
  if (themeClean && PRESET_TOPICS.includes(themeClean)) {
    parsed.name = themeClean;
  }
  // 効果名を50テーマリストで強制補正（架空名は絶対に出さない）
  else if (parsed.name) {
    const similarity = (a, b) => {
      const setA = new Set([...a]);
      const setB = new Set([...b]);
      const intersection = [...setA].filter(c => setB.has(c)).length;
      const union = new Set([...setA, ...setB]).size;
      return union === 0 ? 0 : Math.round((intersection / union) * 100);
    };
    const nameBase = parsed.name.replace(/\s*※.*$/, '').trim();
    const exactMatch = PRESET_TOPICS.find(t => t === nameBase);
    if (exactMatch) {
      // 完全一致 → そのまま
      parsed.name = exactMatch;
    } else {
      // 近似一致チェック（部分一致）
      const partialMatch = PRESET_TOPICS.find(t => nameBase.includes(t) || t.includes(nameBase));
      if (partialMatch) {
        const score = similarity(nameBase, partialMatch);
        parsed.name = `${partialMatch} ※近似${score}%`;
      } else {
        // 50テーマ外 → AIの効果名をそのまま残してマーク
        parsed.name = `${nameBase} ※50テーマ外`;
      }
    }
  }
  return parsed;
}

function PrompterScreen({ script, onBack }) {
  const [playing, setPlaying] = useState(false);

  const rafRef = useRef(null);
  const lastTimeRef = useRef(null);
  const fontClass = FONT_SIZES[fontSize];

  const tick = useCallback((timestamp) => {
    if (!lastTimeRef.current) lastTimeRef.current = timestamp;
    const delta = timestamp - lastTimeRef.current;
    lastTimeRef.current = timestamp;
    if (scrollRef.current) scrollRef.current.scrollTop += (speed * delta) / 16;
    rafRef.current = requestAnimationFrame(tick);
  }, [speed]);

  useEffect(() => {
    if (playing) { lastTimeRef.current = null; rafRef.current = requestAnimationFrame(tick); }
    else cancelAnimationFrame(rafRef.current);
    return () => cancelAnimationFrame(rafRef.current);
  }, [playing, tick]);

  const cycleFontSize = () => setFontSize(f => f === 'small' ? 'medium' : f === 'medium' ? 'large' : 'small');
  const fontLabel = { small: '小', medium: '中', large: '大' }[fontSize];
  const fw = FRAMEWORKS.find(f => f.key === (script.frameworkKey || 'default')) || FRAMEWORKS[0];

  return (
    <div className={`min-h-screen bg-black flex flex-col ${mirror ? 'mirror' : ''}`}>
      <div className="flex items-center gap-3 px-4 py-3 border-b border-gray-800 shrink-0">
        <button onClick={onBack} className="text-gray-400 text-2xl leading-none active:text-white transition-colors px-1">←</button>
        <div className="flex-1 min-w-0">
          <div className="text-white font-bold text-lg leading-tight truncate">{script.title}</div>
          <div className="flex items-center gap-2 mt-0.5">
            {script.theme && <span className="text-gray-500 text-xs">#{script.theme}</span>}
            <span className="text-gray-600 text-xs">{fw.label}</span>
          </div>
        </div>
      </div>
      <div ref={scrollRef} className="flex-1 overflow-y-auto px-5 py-6 space-y-10">
        {fw.sections.map(sec => {
          const text = script[sec.key];
          if (!text) return null;
          return (
            <div key={sec.key}>
              <div className="inline-block text-sm font-bold px-3 py-1 rounded-full mb-3" style={{ background: sec.color, color: '#000' }}>
                {sec.label}
              </div>
              <div className={`${fontClass} font-bold text-white leading-relaxed whitespace-pre-wrap`}>{text}</div>
            </div>
          );
        })}
        <div className="h-screen" />
      </div>
      <div className="shrink-0 bg-gray-950 border-t border-gray-800 px-4 pt-3 pb-5 space-y-3">
        <div className="flex items-center gap-3">
          <span className="text-gray-400 text-xs w-8 shrink-0">速度</span>
          <input type="range" min="0.5" max="8" step="0.5" value={speed} onChange={e => setSpeed(Number(e.target.value))} className="flex-1 h-2 accent-white cursor-pointer" />
          <span className="text-gray-300 text-sm w-6 text-right shrink-0">{speed}</span>
        </div>
        <div className="flex gap-2">
          <button
            onClick={() => setPlaying(p => !p)}
            className="flex-1 py-4 rounded-2xl text-xl font-bold active:scale-95 transition-transform"
            style={{ background: playing ? '#EF4444' : '#fff', color: playing ? '#fff' : '#000' }}
          >
            {playing ? '⏸ 停止' : '▶ 再生'}
          </button>
          <button onClick={cycleFontSize} className="px-5 py-4 rounded-2xl bg-gray-800 text-white text-xl font-bold active:scale-95 transition-transform">文字{fontLabel}</button>
          <button onClick={() => setMirror(m => !m)} className={`px-4 py-4 rounded-2xl text-xl font-bold active:scale-95 transition-transform ${mirror ? 'bg-blue-600 text-white' : 'bg-gray-800 text-white'}`}>⇔</button>
        </div>
      </div>
    </div>
  );
}

// ─── 編集画面 ────────────────────────────────────────────────────
function EditScreen({ script: initial, onSave, onBack, onRegen }) {
  const [draft, setDraft] = useState(initial);
  const [copied, setCopied] = useState(false);
  useEffect(() => { setDraft(initial); }, [initial.id, initial.hook]);
  const set = (key, val) => setDraft(d => ({ ...d, [key]: val }));
  const handleSave = () => {
    if (!draft.title.trim()) { alert('タイトルを入力してください'); return; }
    onSave(draft);
  };
  const handleCopy = () => {
    const fw = FRAMEWORKS.find(f => f.key === (draft.frameworkKey || 'default')) || FRAMEWORKS[0];
    const lines = [
      `【効果名】${draft.name || ''}`,
      `【テーマ】${draft.theme || ''}`,
      `【タイトル】${draft.title || ''}`,
      '',
    ];
    fw.sections.forEach(sec => {
      if (draft[sec.key]) lines.push(`■ ${sec.label}`, draft[sec.key], '');
    });
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <div className="min-h-screen bg-black flex flex-col">
      <div className="flex items-center gap-3 px-4 py-3 border-b border-gray-800 shrink-0">
        <button onClick={onBack} className="text-gray-400 text-2xl active:text-white transition-colors px-1">←</button>
        <span className="flex-1 text-white font-bold text-lg">{initial.title ? '台本を編集' : '新規台本'}</span>
        {onRegen && (
          <button onClick={() => onRegen(draft)} className="bg-purple-700 text-white font-bold px-3 py-2 rounded-xl text-sm active:scale-95 transition-transform">🔄 別シーン</button>
        )}
        <button onClick={handleCopy} className={`font-bold px-3 py-2 rounded-xl text-sm active:scale-95 transition-all ${copied ? 'bg-green-500 text-white' : 'bg-gray-700 text-white'}`}>{copied ? '✅ コピー済' : '📋 コピー'}</button>
        <button onClick={handleSave} className="bg-white text-black font-bold px-5 py-2 rounded-xl active:scale-95 transition-transform">保存</button>
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-4">
        <div>
          <label className="block text-gray-400 text-sm mb-1">タイトル <span className="text-red-400">*</span></label>
          <input type="text" value={draft.title} onChange={e => set('title', e.target.value)} placeholder="例：フック力を上げる方法" className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white text-lg placeholder-gray-600 focus:outline-none focus:border-gray-500" />
        </div>
        <div>
          <label className="block text-gray-400 text-sm mb-1">テーマ（タグ）</label>
          <input type="text" value={draft.theme} onChange={e => set('theme', e.target.value)} placeholder="例：行動経済学" className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white text-lg placeholder-gray-600 focus:outline-none focus:border-gray-500" />
        </div>
        {(FRAMEWORKS.find(f => f.key === (draft.frameworkKey || 'default')) || FRAMEWORKS[0]).sections.map(sec => (
          <div key={sec.key}>
            <label className="flex items-center gap-2 text-sm mb-1">
              <span className="px-2 py-0.5 rounded-full text-xs font-bold" style={{ background: sec.color, color: '#000' }}>{sec.label}</span>
            </label>
            <textarea rows={3} value={draft[sec.key] || ''} onChange={e => set(sec.key, e.target.value)} placeholder={`${sec.label}の内容を入力...`} className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white text-base placeholder-gray-600 focus:outline-none focus:border-gray-500" />
          </div>
        ))}
        <div className="h-8" />
      </div>
    </div>
  );
}

// ─── アプリルート ────────────────────────────────────────────────
function App() {
  const [scripts, setScripts] = useState(loadScripts);
  const [screen, setScreen] = useState('list');
  const [activeScript, setActiveScript] = useState(null);
  const [showGenerate, setShowGenerate] = useState(false);
  const [showApiKey, setShowApiKey] = useState(false);
  const [regenTarget, setRegenTarget] = useState(null);

  const persistAndSet = (next) => { saveScripts(next); setScripts(next); };
  const handleNew = () => { setActiveScript(newScript()); setScreen('edit'); };
  const handleEdit = (s) => { setActiveScript(s); setScreen('edit'); };
  const handleSelect = (s) => { setActiveScript(s); setScreen('prompter'); };
  const handleDelete = (id) => {
    if (!confirm('この台本を削除しますか？')) return;
    persistAndSet(scripts.filter(s => s.id !== id));
  };
  const handleSave = (draft) => {
    const exists = scripts.find(s => s.id === draft.id);
    persistAndSet(exists ? scripts.map(s => s.id === draft.id ? draft : s) : [...scripts, draft]);
    setScreen('list');
  };
  const handleGenerated = (draft) => {
    setShowGenerate(false);
    setActiveScript(draft);
    setScreen('edit');
  };
  const handleRegenerated = (draft) => {
    setRegenTarget(null);
    setActiveScript(draft);
  };

  return (
    <>
      {screen === 'prompter' && activeScript
        ? <PrompterScreen script={activeScript} onBack={() => setScreen('list')} />
        : screen === 'edit' && activeScript
        ? <EditScreen script={activeScript} onSave={handleSave} onBack={() => setScreen('list')} onRegen={s => setRegenTarget(s)} />
        : <ListScreen scripts={scripts} onSelect={handleSelect} onEdit={handleEdit} onNew={handleNew} onGenerate={() => setShowGenerate(true)} onDelete={handleDelete} onApiKey={() => setShowApiKey(true)} />
      }
      {showGenerate && <GenerateModal onGenerated={handleGenerated} onClose={() => setShowGenerate(false)} />}
      {showApiKey && <ApiKeyModal onClose={() => setShowApiKey(false)} />}
      {regenTarget && <SceneRegenModal script={regenTarget} onGenerated={handleRegenerated} onClose={() => setRegenTarget(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
